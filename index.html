<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سامانه جامع و هوشمند آوای یقین</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Vazirmatn', sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">

  <!-- Modal ثبت‌نام اولیه کاربران -->
  <div id="registrationModal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-md w-full shadow-2xl">
      <h2 class="text-xl font-bold mb-2 text-emerald-400 text-center">✨ خوش آمدید به آوای یقین</h2>
      <p id="welcomeTextModal" class="text-xs text-slate-400 mb-4 text-center">لطفاً برای استفاده از سامانه، مشخصات خود را وارد کنید:</p>
      
      <div class="space-y-3 mb-4">
        <div>
          <label class="block text-xs text-slate-300 mb-1">نام و نام خانوادگی:</label>
          <input type="text" id="regName" placeholder="مثال: علی رضایی" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-emerald-500">
        </div>
        <div>
          <label class="block text-xs text-slate-300 mb-1">شماره تماس (یا شناسه):</label>
          <input type="text" id="regPhone" placeholder="مثال: 09123456789" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-emerald-500">
        </div>
      </div>
      
      <button onclick="registerUser()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl font-bold transition text-sm shadow-lg">ورود به سامانه گفتگو</button>
    </div>
  </div>

  <!-- هدر بالای صفحه -->
  <header class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center relative z-20">
    <div class="flex items-center gap-3">
      <!-- دکمه سه خط برای موبایل -->
      <button id="menuBtn" onclick="toggleSidebar()" class="md:hidden bg-slate-800 p-2 rounded-xl text-slate-300 hover:text-white transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24=" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <h1 class="text-lg font-bold text-emerald-400">🕌 آوای یقین</h1>
    </div>
    <div class="text-xs text-slate-400 flex items-center gap-2">
      <span id="userDisplayBadge" class="bg-slate-800 px-3 py-1 rounded-full text-slate-300">مهمان</span>
      <a href="admin.html" class="bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-xl font-medium transition text-emerald-400">پنل مدیریت</a>
    </div>
  </header>

  <div class="flex flex-1 relative overflow-hidden">
    
    <!-- سایدبار تاریخچه گفتگوها (مخصوص موبایل و دسکتاپ با قابلیت بسته‌شدن صحیح) -->
    <aside id="sidebar" class="absolute md:relative inset-y-0 right-0 w-72 bg-slate-900 border-l border-slate-800 p-4 flex flex-col z-30 transition-transform duration-300 transform translate-x-full md:translate-x-0 hidden md:flex">
      <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-800">
        <h3 class="font-bold text-sm text-emerald-400">💬 تاریخچه گفتگوهای شما</h3>
        <!-- دکمه ضربدر بستن در موبایل -->
        <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-white text-lg font-bold px-2">✕</button>
      </div>
      <div id="historyList" class="flex-1 overflow-y-auto space-y-2 text-xs text-slate-300">
        <p class="text-slate-500 text-center py-4">هنوز گفتگویی ثبت نشده است.</p>
      </div>
    </aside>

    <!-- بخش اصلی چت -->
    <main class="flex-1 flex flex-col bg-slate-950 p-4 md:p-6 justify-between max-w-4xl mx-auto w-full">
      
      <!-- محفظه پیام‌ها -->
      <div id="chatContainer" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2">
        <div class="bg-slate-900/80 border border-slate-800 p-4 rounded-2xl max-w-2xl">
          <p class="text-sm text-slate-200">سلام! به سامانه جامع و هوشمند آوای یقین خوش آمدید. پرسش خود را درباره احکام و مسائل دینی وارد کنید...</p>
        </div>
      </div>

      <!-- باکس ارسال پیام -->
      <div class="bg-slate-900 border border-slate-800 p-3 rounded-2xl flex items-center gap-2 shadow-lg">
        <input type="text" id="messageInput" onkeypress="handleKeyPress(event)" placeholder="پرسش خود را وارد کنید..." class="flex-1 bg-transparent border-none px-3 py-2 text-sm text-slate-100 focus:outline-none">
        <button onclick="sendMessage()" class="bg-emerald-600 hover:bg-emerald-700 p-3 rounded-xl text-white transition flex items-center justify-center shadow-md">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 transform rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
        </button>
      </div>

    </main>
  </div>

  <script>
    let currentUser = JSON.parse(localStorage.getItem('avaye_user') || 'null');

    window.onload = function() {
      if (currentUser) {
        document.getElementById('registrationModal').classList.add('hidden');
        document.getElementById('userDisplayBadge').innerText = currentUser.name;
        loadLocalHistory();
      }
    }

    async function registerUser() {
      const name = document.getElementById('regName').value.trim();
      const phone = document.getElementById('regPhone').value.trim();

      if (!name || !phone) {
        alert('لطفاً نام و شماره تماس خود را وارد کنید.');
        return;
      }

      currentUser = { name, phone };
      localStorage.setItem('avaye_user', JSON.stringify(currentUser));

      try {
        await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentUser)
        });
      } catch (e) { console.error(e); }

      document.getElementById('registrationModal').classList.add('hidden');
      document.getElementById('userDisplayBadge').innerText = currentUser.name;
    }

    // کنترل منوی موبایل (بدون باگ و قابلیت بسته شدن کامل)
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (sidebar) {
        sidebar.classList.toggle('hidden');
        sidebar.classList.toggle('translate-x-full');
      }
    }

    // بستن سایدبار با کلیک روی فضای خالی بیرون از آن در موبایل
    document.addEventListener('click', function(event) {
      const sidebar = document.getElementById('sidebar');
      const menuBtn = document.getElementById('menuBtn');
      if (window.innerWidth < 768 && sidebar && !sidebar.classList.contains('hidden')) {
        if (!sidebar.contains(event.target) && menuBtn && !menuBtn.contains(event.target)) {
          sidebar.classList.add('hidden');
          sidebar.classList.add('translate-x-full');
        }
      }
    });

    function handleKeyPress(e) {
      if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;

      if (!currentUser) {
        document.getElementById('registrationModal').classList.remove('hidden');
        return;
      }

      const chatContainer = document.getElementById('chatContainer');
      
      // نمایش پیام کاربر
      chatContainer.innerHTML += `
        <div class="flex justify-end">
          <div class="bg-emerald-600 text-white p-3.5 rounded-2xl max-w-xl text-sm shadow-md">
            ${message}
          </div>
        </div>`;
      input.value = '';
      chatContainer.scrollTop = chatContainer.scrollHeight;

      // لودینگ پاسخ
      const loadingId = 'loading_' + Date.now();
      chatContainer.innerHTML += `
        <div id="${loadingId}" class="flex justify-start">
          <div class="bg-slate-900 border border-slate-800 text-slate-300 p-3.5 rounded-2xl text-sm">
            در حال پردازش و استخراج پاسخ...
          </div>
        </div>`;
      chatContainer.scrollTop = chatContainer.scrollHeight;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, user: currentUser })
        });
        const data = await res.json();
        
        document.getElementById(loadingId).remove();

        const reply = data.reply || data.error || "خطایی در دریافت پاسخ رخ داد.";
        
        chatContainer.innerHTML += `
          <div class="flex justify-start">
            <div class="bg-slate-900 border border-slate-800 text-slate-100 p-3.5 rounded-2xl max-w-2xl text-sm shadow-md leading-relaxed">
              ${reply}
            </div>
          </div>`;
        chatContainer.scrollTop = chatContainer.scrollHeight;

        saveToLocalHistory(message, reply);
      } catch (err) {
        document.getElementById(loadingId).remove();
        alert('خطا در ارتباط با سرور ابری.');
      }
    }

    function saveToLocalHistory(q, a) {
      let history = JSON.parse(localStorage.getItem('chat_history') || '[]');
      history.unshift({ q, a });
      if (history.length > 20) history.pop();
      localStorage.setItem('chat_history', JSON.stringify(history));
      loadLocalHistory();
    }

    function loadLocalHistory() {
      const historyList = document.getElementById('historyList');
      let history = JSON.parse(localStorage.getItem('chat_history') || '[]');
      if (history.length === 0) {
        historyList.innerHTML = `<p class="text-slate-500 text-center py-4">هنوز گفتگویی ثبت نشده است.</p>`;
        return;
      }
      historyList.innerHTML = '';
      history.forEach(item => {
        historyList.innerHTML += `
          <div class="bg-slate-800/60 p-2.5 rounded-xl border border-slate-700/50 cursor-pointer hover:bg-slate-800 transition">
            <p class="font-bold text-emerald-400 truncate"> پرسش: ${item.q}</p>
            <p class="text-slate-400 truncate mt-1">پاسخ: ${item.a}</p>
          </div>`;
      });
    }
  </script>
</body>
</html>
