<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آوای یقین | هوش مصنوعی پاسخگو به سوالات دینی</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Vazirmatn Font -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col justify-between overflow-x-hidden selection:bg-amber-500 selection:text-slate-950">

    <!-- Background Pattern & Lighting -->
    <div class="fixed inset-0 bg-islamic-pattern opacity-10 pointer-events-none z-0"></div>
    <div class="fixed -top-40 -right-40 w-96 h-96 bg-emerald-600/30 rounded-full blur-[128px] pointer-events-none"></div>
    <div class="fixed -bottom-40 -left-40 w-96 h-96 bg-amber-500/20 rounded-full blur-[128px] pointer-events-none"></div>

    <!-- 1. Onboarding Modal (درخواست نام و شماره تلفن) -->
    <div id="onboardingModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
        <div class="glass-card w-full max-w-md p-8 rounded-3xl border border-emerald-500/30 shadow-2xl relative overflow-hidden">
            <div class="text-center mb-6">
                <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-tr from-emerald-800 to-emerald-600 flex items-center justify-center shadow-lg border border-amber-400/40">
                    <i class="fa-solid font-bold fa-mosque text-3xl text-amber-300"></i>
                </div>
                <h2 class="text-2xl font-black text-amber-300 mb-1">به «آوای یقین» خوش آمدید</h2>
                <p class="text-xs text-slate-300">دستیار هوشمند پاسخگویی به سوالات دینی و معارفی</p>
            </div>
            
            <form id="onboardingForm" class="space-y-4">
                <div>
                    <label class="block text-xs text-emerald-200 mb-1 font-medium">نام و نام خانوادگی</label>
                    <div class="relative">
                        <i class="fa-regular fa-user absolute right-3 top-3.5 text-slate-400 text-sm"></i>
                        <input type="text" id="userName" required placeholder="مثال: علی محمدی" class="glass-input w-full pr-10 pl-4 py-3 rounded-xl border border-emerald-500/20 bg-slate-900/50 text-sm focus:outline-none focus:border-amber-400 text-white placeholder-slate-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-emerald-200 mb-1 font-medium">شماره همراه</label>
                    <div class="relative">
                        <i class="fa-solid fa-mobile-screen absolute right-3 top-3.5 text-slate-400 text-sm"></i>
                        <input type="tel" id="userPhone" required placeholder="09123456789" dir="ltr" class="glass-input w-full pr-10 pl-4 py-3 rounded-xl border border-emerald-500/20 bg-slate-900/50 text-sm focus:outline-none focus:border-amber-400 text-white placeholder-slate-500 text-right">
                    </div>
                </div>
                <button type="submit" class="w-full py-3.5 px-6 rounded-xl bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-white font-bold shadow-lg shadow-emerald-900/40 border border-amber-400/30 transition duration-300 flex items-center justify-center gap-2 mt-2">
                    <span>ورود به آوای یقین</span>
                    <i class="fa-solid fa-arrow-left text-amber-300 text-sm"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Main Chat App Interface -->
    <div id="mainApp" class="relative z-10 flex flex-col h-screen max-w-5xl mx-auto w-full px-2 sm:px-4 py-3 hidden">
        <!-- Header -->
        <header class="glass-card rounded-2xl p-4 mb-3 border border-emerald-500/20 flex items-center justify-between shadow-xl">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 rounded-xl bg-gradient-to-tr from-emerald-800 to-emerald-600 flex items-center justify-center border border-amber-400/30 shadow-md">
                    <i class="fa-solid fa-kaaba text-amber-300 text-xl"></i>
                </div>
                <div>
                    <h1 id="headerBotName" class="font-black text-amber-300 text-lg sm:text-xl">آوای یقین</h1>
                    <span class="text-[11px] text-emerald-300/80 flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                        پاسخگوی هوشمند سوالات دینی
                    </span>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button id="newChatBtn" title="گفتگوی جدید" class="p-2.5 rounded-xl bg-slate-900/60 hover:bg-emerald-900/40 border border-emerald-500/20 text-emerald-300 transition">
                    <i class="fa-solid fa-plus text-sm"></i>
                </button>
                <div id="userBadge" class="hidden sm:flex items-center gap-2 bg-slate-900/60 border border-emerald-500/20 px-3 py-1.5 rounded-xl text-xs text-slate-300">
                    <i class="fa-regular fa-circle-user text-amber-300"></i>
                    <span id="displayUserName">کاربر</span>
                </div>
            </div>
        </header>

        <!-- Chat Messages Container -->
        <main id="chatBox" class="flex-1 glass-card rounded-2xl p-4 sm:p-6 border border-emerald-500/20 overflow-y-auto space-y-4 shadow-inner mb-3">
            <!-- Messages will be appended dynamically here -->
        </main>

        <!-- Input Box -->
        <footer class="relative">
            <form id="chatForm" class="glass-card rounded-2xl p-2 border border-emerald-500/30 flex items-center gap-2 shadow-2xl bg-slate-950/70">
                <textarea id="chatInput" rows="1" placeholder="سوال دینی یا معارفی خود را بنویسید..." class="flex-1 bg-transparent border-none text-white text-sm px-3 py-2.5 focus:outline-none resize-none max-h-32 placeholder-slate-400 font-sans"></textarea>
                <button type="submit" id="sendBtn" class="w-11 h-11 rounded-xl bg-gradient-to-tr from-emerald-600 to-amber-500 hover:from-emerald-500 hover:to-amber-400 text-slate-950 font-bold flex items-center justify-center shadow-lg transition duration-200 shrink-0">
                    <i class="fa-solid fa-paper-plane text-emerald-950"></i>
                </button>
            </form>
            <p class="text-[10px] text-center text-slate-300 mt-2">طراحی‌شده برای پاسخگویی مستند و محترمانه به پرسش‌های دینی</p>
        </footer>
    </div>

    <!-- 2. Admin Panel Modal -->
    <div id="adminModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-lg hidden">
        <div class="glass-card w-full max-w-3xl max-h-[90vh] rounded-3xl border border-amber-400/40 shadow-2xl flex flex-col overflow-hidden bg-slate-900/90">
            <!-- Admin Header -->
            <div class="p-5 bg-gradient-to-r from-emerald-900/80 to-slate-900 border-b border-amber-400/20 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-amber-400/10 border border-amber-400/30 flex items-center justify-center">
                        <i class="fa-solid fa-sliders text-amber-300 text-lg"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-amber-300">پنل مدیریت هوشمند آوای یقین</h2>
                        <p class="text-xs text-emerald-200">مدیریت پیکربندی، شخصیت هوش مصنوعی و گفتگوها</p>
                    </div>
                </div>
                <button id="closeAdminBtn" class="w-8 h-8 rounded-lg bg-slate-800 text-slate-400 hover:text-white flex items-center justify-center">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <!-- Admin Body Tabs -->
            <div class="flex border-b border-emerald-500/20 bg-slate-950/50">
                <button id="tabSettingsBtn" class="flex-1 py-3 px-4 text-xs font-bold text-amber-300 border-b-2 border-amber-400 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-gear"></i>
                    تنظیمات ربات
                </button>
                <button id="tabUsersBtn" class="flex-1 py-3 px-4 text-xs font-bold text-slate-400 border-b-2 border-transparent flex items-center justify-center gap-2">
                    <i class="fa-solid fa-users"></i>
                    کاربران و چت‌ها
                </button>
            </div>

            <!-- Admin Content Container -->
            <div class="p-6 overflow-y-auto flex-1 space-y-5">
                <!-- Tab 1: Settings -->
                <div id="tabSettings" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-emerald-200 mb-1">نام ربات</label>
                        <input type="text" id="adminBotName" class="glass-input w-full p-3 rounded-xl border border-emerald-500/20 bg-slate-950 text-sm text-white focus:outline-none focus:border-amber-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-emerald-200 mb-1">دستورالعمل و شخصیت هوش مصنوعی (System Prompt)</label>
                        <textarea id="adminSystemPrompt" rows="5" class="glass-input w-full p-3 rounded-xl border border-emerald-500/20 bg-slate-950 text-xs text-emerald-100 focus:outline-none focus:border-amber-400 leading-relaxed font-sans"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-emerald-200 mb-1">پیام خوش‌آمدگویی اولیه</label>
                        <textarea id="adminWelcomeMsg" rows="3" class="glass-input w-full p-3 rounded-xl border border-emerald-500/20 bg-slate-950 text-xs text-emerald-100 focus:outline-none focus:border-amber-400 leading-relaxed font-sans"></textarea>
                    </div>
                    <button id="saveSettingsBtn" class="w-full py-3 bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold rounded-xl shadow-lg transition">
                        ذخیره تغییرات پنل مدیریت
                    </button>
                </div>

                <!-- Tab 2: Users & Chats -->
                <div id="tabUsers" class="hidden space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-xs text-slate-300">لیست کاربران ثبت‌نام‌شده:</span>
                        <button id="refreshLogsBtn" class="text-xs text-amber-300 hover:underline flex items-center gap-1">
                            <i class="fa-solid fa-arrows-rotate"></i> بروزرسانی
                        </button>
                    </div>
                    <div id="usersListContainer" class="space-y-3">
                        <!-- User list dynamically populates here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
